name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Check machine configuration
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo "云编译建议取消勾选Node.js及其相关插件！"
        echo "已知CPU型号（降序）：7763,8370C,8272CL,8171M,E5系列"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "--------------------------硬盘信息--------------------------"
        echo -e  "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "硬盘详情："
        df -Th
        
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Freeing up disk space
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 6144
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="
        
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt update
        sudo -E apt -y install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt -y autoremove --purge
        sudo -E apt -y install libfuse-dev
        sudo -E apt -y install rename
        sudo -E apt -y install time
        sudo -E apt -y install gn
        sudo -E systemctl daemon-reload
        sudo -E apt clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Clone source code
      working-directory: ./
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        sed -i 's|https://github.com/coolsnowwolf/luci.git;openwrt-23.05|https://github.com/coolsnowwolf/luci|g' feeds.conf.default

    - name: cache wrt build
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: amlogic-${{ env.REPO_BRANCH }}
        prefix: ${{ github.workspace }}/openwrt
        
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH

    # - name: SSH connect to Actions
      # uses: P3TERX/ssh2actions@main
      # if: (github.event.inputs.ssh == 'true') || contains(github.event.action, 'ssh')

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 编译命令
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Cleanup build garbage to free up space
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo "=== 清理系统级大目录（为打包释放空间）==="
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
        sudo apt-get clean || true
        echo "=== 系统级清理完成 ==="
        df -hT
        if [ -d openwrt ]; then
          cd openwrt
          # 删除编译中间产物，仅保留 bin 目录下的成品
          rm -rf build_dir staging_dir tmp dl feeds
          echo "编译中间产物已清理"
        fi
        # Conditionally clear ccache if it exceeds 2 GB
        ccache_dir="${GITHUB_WORKSPACE}/openwrt/.ccache"
        if [ -d "${ccache_dir}" ]; then
          ccache_size_kb=$(du -sk "${ccache_dir}" 2>/dev/null | awk '{print $1}')
          if [ "${ccache_size_kb:-0}" -gt 2097152 ]; then
            echo "ccache dir exceeds 2 GB (${ccache_size_kb} KB), clearing it."
            rm -rf "${ccache_dir}"
          else
            echo "ccache dir size: ${ccache_size_kb} KB (below threshold, keeping)"
          fi
        fi
        echo "=== 清理后的磁盘状态 ==="
        df -hT

    - name: Diagnose disk usage before packaging
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo "=== Disk usage overview ==="
        df -hT
        echo "=== Largest directories under \$GITHUB_WORKSPACE/openwrt ==="
        du -hx --max-depth=2 "${GITHUB_WORKSPACE}/openwrt" 2>/dev/null | sort -rh | head -20 || true
        echo "=== Largest directories under /opt ==="
        sudo du -hx --max-depth=2 /opt 2>/dev/null | sort -rh | head -20 || true
        echo "=== Largest directories under /usr/local ==="
        sudo du -hx --max-depth=2 /usr/local 2>/dev/null | sort -rh | head -20 || true
        echo "=== Largest directories under /home/runner ==="
        du -hx --max-depth=2 /home/runner 2>/dev/null | sort -rh | head -20 || true

    - name: Check disk space and rootfs before packaging
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo "Disk usage before packaging:"
        df -hT
        echo "Locating rootfs file:"
        find ${{ github.workspace }}/openwrt/bin/targets -name "*rootfs.tar.gz" -ls || echo "WARNING: rootfs NOT found!"
        # Hard pre-packaging disk-space gate: require at least 1 GB free on /
        # Packaging now uses $GITHUB_WORKSPACE via symlink, so / only needs minimal headroom.
        # Use df -PB1 to get available bytes directly, then compare against 1*1024*1024*1024
        avail_bytes=$(df -PB1 / | awk 'NR==2 {print $4}')
        min_bytes=$((1 * 1024 * 1024 * 1024))
        if ! echo "${avail_bytes}" | grep -qE '^[0-9]+$'; then
          echo "::error::Could not determine available disk space on / (got: '${avail_bytes}'). Aborting."
          exit 1
        fi
        avail_gb=$((avail_bytes / 1024 / 1024 / 1024))
        echo "Available disk space on /: ${avail_bytes} bytes (~${avail_gb} GB)"
        if [ "${avail_bytes}" -lt "${min_bytes}" ]; then
          echo "::error::Insufficient disk space before packaging: only ~${avail_gb} GB available (need >= 1 GB). The build cleanup was insufficient; consider using a larger runner or reducing the build footprint."
          exit 1
        fi
        echo "Disk space check passed: ~${avail_gb} GB available (minimum 1 GB required)."

    - name: Redirect packit workdir to workspace volume
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # unifreq/openwrt_packit works under /opt/openwrt_packit which lives on
        # the root filesystem.  After maximize-build-space the root partition is
        # small, so symlink the directory to the large workspace volume instead.
        sudo mkdir -p "$GITHUB_WORKSPACE/openwrt_packit"
        sudo rm -rf /opt/openwrt_packit
        sudo ln -sfn "$GITHUB_WORKSPACE/openwrt_packit" /opt/openwrt_packit
        echo "Redirected /opt/openwrt_packit → $GITHUB_WORKSPACE/openwrt_packit"
        ls -la /opt/openwrt_packit

    - name: Package OpenWrt Firmware
      if: steps.compile.outputs.status == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      id: pack
      env:
        OPENWRT_ARMVIRT: ${{ github.workspace }}/openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_VERSION_NAME: 5.15.176
        KERNEL_AUTO_LATEST: false
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0

    - name: Inspect openwrt_packit output
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo "=== Contents of /opt/openwrt_packit ==="
        ls -lah /opt/openwrt_packit 2>/dev/null || echo "Directory /opt/openwrt_packit does not exist"
        echo "=== Subdirectory tree (max depth 2) ==="
        find /opt/openwrt_packit -maxdepth 2 -type d -print 2>/dev/null || true
        echo "=== Firmware images found ==="
        find /opt/openwrt_packit -maxdepth 3 \( -name "*.img.gz" -o -name "*.img" \) -print 2>/dev/null | head -20 || true

    - name: Validate packaging output
      id: validate_output
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        output_dir="/opt/openwrt_packit/output"
        if [ ! -d "${output_dir}" ]; then
          echo "::error::Packaging failed: output directory '${output_dir}' not found."
          exit 1
        fi
        file_count=$(find "${output_dir}" -maxdepth 1 -type f | wc -l)
        if [ "${file_count}" -eq 0 ]; then
          echo "::error::Packaging failed: output directory '${output_dir}' is empty."
          exit 1
        fi
        echo "Output directory contains ${file_count} file(s):"
        ls -lh "${output_dir}"
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Resolve release tag date
      id: tagmeta
      if: steps.validate_output.outputs.status == 'success' && !cancelled()
      run: |
        if [ -n "${PACKAGED_OUTPUTDATE}" ]; then
          echo "output_date=${PACKAGED_OUTPUTDATE}" >> $GITHUB_OUTPUT
        else
          echo "output_date=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT
        fi
       
    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: steps.validate_output.outputs.status == 'success' && !cancelled()
      with:
        tag: OpenWrt_N1_${{ steps.tagmeta.outputs.output_date }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于lean openwrt构建
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.3.2
          账户: root
          密码: password
          
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        keep_latest: 10
        delete_tags : true
